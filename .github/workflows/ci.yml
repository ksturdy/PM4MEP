name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Real connection: the RLS coverage test (packages/db/src/rls-coverage.test.ts)
  # needs an actual Postgres to introspect pg_policies/pg_class against — see
  # the `postgres` service below. typecheck/lint/build never open a
  # connection, so this same value covers them too.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm4mep

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pm4mep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations and RLS policies
        run: |
          pnpm --filter @pm4mep/db exec prisma migrate deploy
          for f in packages/db/prisma/rls/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
