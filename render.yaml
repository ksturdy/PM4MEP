# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Defines the pm4mep-api and pm4mep-web services plus their Postgres
# database. Deploy this blueprint once per environment (staging, then
# production) as two separate Render "projects" — Render Blueprints don't
# natively template multiple environments from one file, so duplicate this
# file's values (with a -staging / -prod service name suffix) rather than
# trying to parameterize a single blueprint across both.
#
# Secrets (marked sync: false) must be filled in via the Render dashboard
# after the first blueprint deploy — never commit real values here.

databases:
  - name: pm4mep-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: pm4mep-api
    runtime: node
    plan: starter
    rootDir: apps/api
    # turbo (not a bare `pnpm --filter build`) so the @pm4mep/db,
    # @pm4mep/shared-schema, and @pm4mep/domain workspace packages this
    # service imports get built first, in dependency order — same as local
    # dev, where `pnpm turbo run build` always builds them before apps/api.
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@pm4mep/api...
    # Runs once per deploy, after build, before traffic shifts to the new
    # instance. `prisma db execute` (not raw psql) since Render's Node build
    # image isn't guaranteed to have postgresql-client installed. New RLS
    # files under packages/db/prisma/rls/ must be added here by hand — same
    # "no automation, hand-applied SQL" convention as CI and local dev.
    preDeployCommand: cd ../.. && pnpm --filter @pm4mep/db exec prisma migrate deploy && pnpm --filter @pm4mep/db exec prisma db execute --file prisma/rls/001_enable_rls.sql --schema prisma/schema.prisma && pnpm --filter @pm4mep/db exec prisma db execute --file prisma/rls/002_estimating_rls.sql --schema prisma/schema.prisma
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pm4mep-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: WEB_APP_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ESSENTIALS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ESSENTIALS_ANNUAL
        sync: false
      - key: STRIPE_PRICE_GROWTH_MONTHLY
        sync: false
      - key: STRIPE_PRICE_GROWTH_ANNUAL
        sync: false
      - key: TRIAL_PERIOD_DAYS
        value: 14
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

  - type: web
    name: pm4mep-web
    runtime: node
    plan: starter
    rootDir: apps/web
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@pm4mep/web...
    startCommand: pnpm --filter @pm4mep/web start
    # www is primary; apex pm4mep.com is listed so Render issues a cert for
    # it too and can redirect it to www (configured in the Render dashboard
    # after DNS is verified, since Blueprint sync doesn't set redirect targets).
    domains:
      - www.pm4mep.com
      - pm4mep.com
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: pm4mep-api
          property: hostport
